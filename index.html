<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<title>Tastefully Pixelated</title>

<!-- Mobile viewport -->
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<!-- iOS web app support -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pixelated">

<!-- Android / Chrome install support -->
<meta name="theme-color" content="#111111">

<!-- Prevent favicon 404 -->
<link rel="icon" href="data:,">

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="styles.css">

</head>


<body>

<div class="app-backdrop">

  <div class="app">

    <h1 class="app-title">Tastefully Pixelated</h1>
    <p class="subhead" id="subhead"></p>


    <!-- Banner -->
    <div class="banner">

      <h2 id="bannerHeadline"></h2>

      <div class="banner-spinner">
        <img src="images/spinner.png" alt="spinner">
      </div>

      <button class="spend-btn">Spend</button>

    </div>


    <!-- Canvas Area -->
    <div class="canvas-container" id="canvasContainer">

      <canvas id="baseCanvas"></canvas>
      <canvas id="maskCanvas"></canvas>
      <canvas id="previewCanvas"></canvas>

      <div class="canvas-overlay" id="canvasOverlay">
<button class="primary-btn canvas-photo-btn" id="canvasSelectBtn">
  Take or<br>select photo
</button>

      </div>

    </div>


    <!-- Hidden File Input -->
    <input type="file" id="uploadInput" hidden accept="image/*">


    <!-- Sliders -->
<div class="slider-row">

  <button id="takePhotoBtn" class="camera-btn">
    Photo
  </button>

  <div class="sliders">

    <div class="slider-group">
      <label for="pixelSlider">Pixel Size</label>
      <input type="range" id="pixelSlider" min="2" max="40" value="12">
    </div>

    <div class="slider-group">
      <label for="zoomSlider">Zoom</label>
      <input type="range" id="zoomSlider" min="1" max="3" step="0.1" value="1">
    </div>

  </div>

<div class="button-row">

  <div class="tool-buttons">
    <button id="drawBtn">Draw</button>
    <button id="moveBtn">Move</button>
    <button id="undoBtn">Undo</button>
    <button id="applyBtn">Apply</button>
  </div>

  <button id="shareBtn" class="share-btn">Share</button>

</div>



</div>

<script src="js/app.js"></script>

</body>
</html>
