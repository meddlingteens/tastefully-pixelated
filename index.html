<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<title>Tastefully Pixelated</title>

<!-- Mobile viewport -->
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<!-- iOS web app support -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pixelated">

<!-- Android / Chrome install support -->
<meta name="theme-color" content="#111111">

<!-- Prevent favicon 404 -->
<link rel="icon" href="data:,">

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="styles.css">

</head>


<body>

<div class="app-backdrop">

  <div class="app">

    <h1 class="app-title">Tastefully Pixelated</h1>
    <p class="subhead" id="subhead"></p>


<!--
<div class="banner">

  <div class="banner-content">
    <h2 id="bannerHeadline"></h2>

    <div class="banner-spinner">
      <img src="images/beer.png" alt="beer">
    </div>

    <button class="spend-btn">Spend</button>
  </div>

  <div class="ad-container"></div>

</div>
-->



    <!-- Canvas Area -->
    <div class="canvas-container" id="canvasContainer">

      <canvas id="baseCanvas"></canvas>
      <canvas id="maskCanvas"></canvas>
      <canvas id="previewCanvas"></canvas>

      <div class="canvas-overlay" id="canvasOverlay">
<button class="primary-btn canvas-photo-btn" id="canvasSelectBtn">
  Select photo
</button>

      </div>

    </div>


    <!-- Hidden File Input -->
    <input type="file" id="uploadInput" hidden accept="image/*">


<div class="sliders">

  <!-- NEW: Brush size -->
  <div class="slider-group">
    <label for="brushSlider">Brush size</label>
    <input type="range" id="brushSlider" min="10" max="80" value="40">
  </div>

  <!-- Existing: Pixel size -->
  <div class="slider-group">
    <label for="pixelSlider">Pixel size</label>
    <input type="range" id="pixelSlider" min="6" max="24" value="12">
  </div>

  <!-- Zoom -->
  <div class="slider-group zoom-slider">
    <label for="zoomSlider">Zoom</label>

    <div class="slider-with-tick">
      <input type="range" id="zoomSlider" min="0.5" max="1.5" step="0.01" value="1">
      <div class="slider-center-tick"></div>
    </div>

  </div>

</div>



<div class="button-grid">
  <button id="drawBtn">Draw</button>
  <button id="moveBtn">Move</button>
  <button id="applyBtn">Apply</button>
  <button id="undoBtn">Undo</button>
  <button id="shareBtn">Share</button>
</div>


</div>

<script src="js/app.js"></script>


<div id="supportModal" class="modal hidden">
  <div class="modal-content">

    <!-- Close X -->
    <button id="closeModal" class="modal-close">×</button>

    <h2>Buy us a beer 🍺</h2>
    <p>Mmmm, frosty!</p>

    <!-- CTA -->
    <button class="primary-btn modal-cta">Spend</button>

  </div>
</div>


</body>
</html>
